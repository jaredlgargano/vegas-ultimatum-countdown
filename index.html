<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question for Erin 💕</title>
    <meta name="description" content="Something important, just for Erin.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --rose: #e8517a;
            --rose-dark: #c23a60;
            --rose-glow: rgba(232, 81, 122, 0.45);
            --gold: #D4AF37;
            --gold-dim: rgba(212, 175, 55, 0.25);
            --black: #080810;
            --panel: rgba(8, 8, 20, 0.72);
        }

        html,
        body {
            height: 100%;
            background: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* ── Animated starfield bg ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(232, 81, 122, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(100, 60, 180, 0.1) 0%, transparent 55%),
                #080810;
        }

        /* Floating hearts */
        .hearts-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -60px;
            font-size: 20px;
            opacity: 0;
            animation: floatHeart linear infinite;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(-15deg) scale(0.8);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-110vh) rotate(15deg) scale(1.1);
                opacity: 0;
            }
        }

        /* ── Glass panel ── */
        .glass {
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(212, 175, 55, 0.18);
            border-top: 2px solid var(--gold);
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        /* ── Layout ── */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        main {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 680px;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            text-align: center;
        }

        /* ── Title ── */
        .eyebrow {
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.6rem, 8vw, 4.4rem);
            font-weight: 600;
            line-height: 1.1;
            color: #fff;
            text-shadow: 0 0 40px rgba(232, 81, 122, 0.25);
        }

        h1 .name {
            color: var(--rose);
            font-style: italic;
            text-shadow: 0 0 20px var(--rose-glow), 0 0 60px var(--rose-glow);
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0.8rem auto 0;
        }

        /* ── Countdown ── */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
        }

        .time-cell {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            padding: 0.9rem 0.4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .time-num {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(1.8rem, 6vw, 3.2rem);
            color: var(--gold);
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
            line-height: 1;
        }

        .time-num.secs {
            color: var(--rose);
            text-shadow: 0 0 10px var(--rose-glow);
        }

        .time-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .zero-state {
            display: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 6vw, 3rem);
            color: var(--rose);
            font-style: italic;
            text-shadow: 0 0 20px var(--rose-glow);
            animation: softPulse 2s ease-in-out infinite;
            padding: 1rem 0;
        }

        @keyframes softPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* ── Status bar ── */
        .status-section {
            text-align: left;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 0.5rem;
        }

        .status-label {
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .status-pct {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--gold);
        }



        /* ── Proposal buttons ── */
        .proposal-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .question {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.4rem, 4vw, 1.9rem);
            font-style: italic;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
        }

        .btn-row {
            display: flex;
            gap: 1.2rem;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 60px;
            position: relative;
        }

        .btn-yes {
            padding: 0.85rem 2.4rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: none;
            border-radius: 99px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--rose-dark), var(--rose));
            color: #fff;
            box-shadow: 0 0 20px var(--rose-glow), 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .btn-yes::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }

        .btn-yes:hover {
            transform: scale(1.07);
            box-shadow: 0 0 35px var(--rose-glow), 0 6px 28px rgba(0, 0, 0, 0.5);
        }

        .btn-yes:hover::before {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-yes:active {
            transform: scale(0.96);
        }

        .btn-no {
            padding: 0.7rem 1.6rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 99px;
            cursor: pointer;
            background: transparent;
            color: rgba(255, 255, 255, 0.32);
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Celebration popup ── */
        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .popup-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .popup-box {
            background: rgba(12, 8, 24, 0.95);
            border: 1px solid var(--rose);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px var(--rose-glow);
            transform: scale(0.88);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .popup-overlay.visible .popup-box {
            transform: scale(1);
        }

        .popup-emoji {
            font-size: 3.5rem;
            line-height: 1;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .popup-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 600;
            color: #fff;
        }

        .popup-body {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.6;
            font-style: italic;
        }

        .popup-close {
            margin-top: 0.5rem;
            padding: 0.6rem 2rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            color: var(--gold);
            background: transparent;
            border-radius: 99px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .popup-close:hover {
            background: var(--gold);
            color: #000;
        }

        /* ── Footer note ── */
        .footer-note {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.18);
            text-transform: uppercase;
        }

        /* ── Responsive ── */
        @media (max-width: 420px) {
            main {
                padding: 2rem 1.25rem;
                gap: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg-layer"></div>

    <!-- Floating hearts -->
    <div class="hearts-layer" id="hearts-layer"></div>

    <!-- Celebration Popup -->
    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-box">
            <div class="popup-emoji">💕</div>
            <h2 class="popup-title">She said YES!</h2>
            <button class="popup-close" id="popup-close">Close</button>
        </div>
    </div>

    <!-- Main Card -->
    <main class="glass">

        <!-- Header -->
        <header>
            <p class="eyebrow">A question, just for you</p>
            <h1>Erin,<br>will you be my<br><span class="name">girlfriend?</span></h1>
            <div class="divider"></div>
        </header>

        <!-- Countdown -->
        <section id="timer-section">
            <div class="countdown-grid" id="countdown">
                <div class="time-cell">
                    <span class="time-num" id="days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-cell">
                    <span class="time-num" id="hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-cell">
                    <span class="time-num" id="minutes">00</span>
                    <span class="time-label">Mins</span>
                </div>
                <div class="time-cell">
                    <span class="time-num secs" id="seconds">00</span>
                    <span class="time-label">Secs</span>
                </div>
            </div>
            <div class="zero-state" id="zero-state">
                The moment is now. 💕
            </div>
            <p class="status-msg" style="margin-top: 0.75rem; text-align:center;">until the big moment — March 14, 2026
            </p>
        </section>

        <!-- Proposal Buttons -->
        <section class="proposal-section">
            <p class="question">So… what do you say?</p>
            <div class="btn-row" id="btn-row">
                <button class="btn-yes" id="btn-yes">💕 Yes!</button>
                <button class="btn-no" id="btn-no">No</button>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p class="footer-note">03 · 14 · 2026 &nbsp;·&nbsp; jared &amp; erin</p>
        </footer>

    </main>

    <script>
        // ── Countdown ──────────────────────────────────────────────
        const targetDate = new Date('2026-03-14T09:30:00-07:00').getTime();
        const startDate = new Date('2026-03-10T12:00:00-07:00').getTime();
        const totalDuration = targetDate - startDate;

        const elDays = document.getElementById('days');
        const elHours = document.getElementById('hours');
        const elMinutes = document.getElementById('minutes');
        const elSeconds = document.getElementById('seconds');
        const elCountdown = document.getElementById('countdown');
        const elZero = document.getElementById('zero-state');


        function pad(n) { return String(n).padStart(2, '0'); }

        function updateTimer() {
            const now = Date.now();
            const distance = targetDate - now;

            if (distance <= 0) {
                clearInterval(timerInterval);
                elCountdown.style.display = 'none';
                elZero.style.display = 'block';
                return;
            }

            const days = Math.floor(distance / 86400000);
            const hours = Math.floor((distance % 86400000) / 3600000);
            const minutes = Math.floor((distance % 3600000) / 60000);
            const seconds = Math.floor((distance % 60000) / 1000);

            elDays.textContent = pad(days);
            elHours.textContent = pad(hours);
            elMinutes.textContent = pad(minutes);
            elSeconds.textContent = pad(seconds);
        }

        updateTimer();
        const timerInterval = setInterval(updateTimer, 1000);

        // ── Floating hearts ────────────────────────────────────────
        const heartsLayer = document.getElementById('hearts-layer');
        const heartEmojis = ['💕', '💗', '🌹', '✨', '💖', '💓'];

        function spawnHeart() {
            const el = document.createElement('div');
            el.className = 'heart';
            el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (14 + Math.random() * 18) + 'px';
            const dur = 8 + Math.random() * 10;
            el.style.animationDuration = dur + 's';
            el.style.animationDelay = Math.random() * 4 + 's';
            heartsLayer.appendChild(el);
            setTimeout(() => el.remove(), (dur + 4) * 1000);
        }

        // Seed initial hearts
        for (let i = 0; i < 12; i++) setTimeout(spawnHeart, i * 600);
        setInterval(spawnHeart, 1400);

        // ── "No" button escape logic ───────────────────────────────
        const btnNo = document.getElementById('btn-no');
        const btnRow = document.getElementById('btn-row');
        let noClickCount = 0;

        const noPhrases = [
            'Nope, try again',
            'Still no?',
            'Are you sure?',
            'Reeeally?',
            'Last chance…',
            'You can\'t mean that 😢',
            'Okay fine, but really though?',
        ];

        function moveNoButton() {
            const rowRect = btnRow.getBoundingClientRect();
            const btnRect = btnNo.getBoundingClientRect();
            const maxX = rowRect.width - btnRect.width;
            const maxY = 80; // pixels above/below baseline

            const x = Math.random() * maxX - maxX / 2;
            const y = (Math.random() * 2 - 1) * maxY;

            btnNo.style.transform = `translate(${x}px, ${y}px)`;
            btnNo.style.transition = 'transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1)';
            btnNo.title = noPhrases[Math.min(noClickCount, noPhrases.length - 1)];
            noClickCount++;
        }

        btnNo.addEventListener('mouseover', moveNoButton);
        btnNo.addEventListener('click', moveNoButton);

        // ── "Yes" button ───────────────────────────────────────────
        const btnYes = document.getElementById('btn-yes');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupClose = document.getElementById('popup-close');

        function launchConfetti() {
            const colors = ['#e8517a', '#D4AF37', '#f9c6d5', '#fff', '#c23a60'];
            const end = Date.now() + 4000;
            (function frame() {
                confetti({ particleCount: 6, angle: 60, spread: 70, origin: { x: 0 }, colors });
                confetti({ particleCount: 6, angle: 120, spread: 70, origin: { x: 1 }, colors });
                confetti({ particleCount: 4, startVelocity: 20, spread: 360, origin: { x: 0.5, y: 0.4 }, colors, scalar: 0.8 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        btnYes.addEventListener('click', () => {
            launchConfetti();
            setTimeout(() => {
                popupOverlay.classList.add('visible');
            }, 300);
        });

        function closePopup() {
            popupOverlay.classList.remove('visible');
        }

        popupClose.addEventListener('click', closePopup);
        popupOverlay.addEventListener('click', e => {
            if (e.target === popupOverlay) closePopup();
        });
    </script>
</body>

</html>
